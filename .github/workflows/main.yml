name: Build WinPE ISO

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build WinPE
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Windows ADK and WinPE Add-on
        shell: powershell
        run: |
          # Function to retry choco installs on network failure or timeouts
          function Install-WithRetry {
              param ([string]$PackageName)
              $MaxRetries = 3
              $RetryCount = 0
              $Success = $false

              do {
                  Write-Host "Attempting to install $PackageName (Attempt $($RetryCount + 1))"
                  
                  # --execution-timeout=2700 sets the limit to 45 minutes (default is too short for ADK)
                  choco install $PackageName -y --no-progress --execution-timeout=2700
                  
                  if ($LASTEXITCODE -eq 0) {
                      $Success = $true
                  } else {
                      Write-Warning "Install failed. Waiting 15s before retrying..."
                      Start-Sleep -Seconds 15
                      $RetryCount++
                  }
              } while ($Success -eq $false -and $RetryCount -lt $MaxRetries)

              if (-not $Success) {
                  Write-Error "Failed to install $PackageName after $MaxRetries attempts."
                  exit 1
              }
          }

          # Install the ADK Core
          Install-WithRetry "windows-adk"
          
          # Install the WinPE Add-on
          Install-WithRetry "windows-adk-winpe"

      - name: Create WinPE Files and Build ISO
        shell: cmd
        run: |
          :: 1. Locate the Deployment Tools environment script
          :: Note: Even for Win 11 ADK, the path often remains "Windows Kits\10"
          call "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\DandISetEnv.bat"
          
          :: 2. Create the working directory for 64-bit WinPE
          call copype amd64 C:\winpe_amd64
          
          :: 3. Generate the ISO file
          call MakeWinPEMedia /ISO C:\winpe_amd64 C:\winpe_amd64\WinPE_amd64.iso

      - name: Upload WinPE ISO
        uses: actions/upload-artifact@v7
        with:
          name: WinPE-ISO
          path: C:\winpe_amd64\WinPE_amd64.iso
          if-no-files-found: error
          retention-days: 5
